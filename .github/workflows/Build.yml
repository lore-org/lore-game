name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [static, shared]
        config:
        - name: Windows
          os: windows-latest
          id: win

        - name: Linux
          os: ubuntu-latest
          id: linux

        - name: macOS
          os: macos-latest
          id: mac

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Upgrade CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      
      - name: Install Dependencies
        if: matrix.config.id != 'win'
        run: brew install bzip2 zlib libpng

      - name: Config
        run: xmake -m release --static=${{ matrix.libs == 'static' && 'y' || 'n' }} -y
      
      - name: Build
        run: xmake -y
      
      - name: Install
        run: xmake install -y

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/bin
