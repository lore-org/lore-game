name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [shared, static]
        config:
        - name: Windows
          os: windows-latest
          id: windows

        - name: Linux
          os: ubuntu-latest
          id: linux

        # macOS is broken with SDL3_image :(
        # - name: macOS
        #   os: macos-latest
        #   id: macosx

    name: ${{ matrix.config.name }} (${{ matrix.libs }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Upgrade CMake
        uses: jwlawson/actions-setup-cmake@v2
      
      - name: Setup GCC
        uses: egor-tensin/setup-gcc@v1
        
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: 'Setup jq'
        uses: dcarbone/install-jq-action@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install meson ninja
      
      - name: Setup
        run: >
          meson setup
          build
          --default-library ${{ matrix.libs }}
          --optimization 3
          --buildtype release
      
      - name: Build
        run: >
          meson compile
          -C build
          -j 0
      
      - name: Copy Binaries
        shell: bash
        run: |
          cp build/$(meson introspect build --projectinfo -i | jq -r '.descriptive_name')* build/bin
          cp build/*.{dll,so,dylib} build/bin
          cp build/subprojects/*/*.{dll,so,dylib} build/bin
          cp build/subprojects/*/*/*.{dll,so,dylib} build/bin
          cp resources build/bin

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/bin
