name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          id: linux

        - name: Linux
          os: ubuntu-latest
          id: win

        - name: macOS
          os: macos-latest
          id: mac

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup CPM Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cpm-cache
          key: cpm-${{ matrix.config.id }}-v1-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            cpm-${{ matrix.config.id }}-v1-

      - name: Install Ninja
        shell: bash
        run: |
            curl -L https://github.com/ninja-build/ninja/releases/latest/download/ninja-${{ matrix.config.id }}.zip -o ninja.zip
            7z x ninja.zip -o"$GITHUB_WORKSPACE/ninja"
            echo "$GITHUB_WORKSPACE/ninja" >> $GITHUB_PATH
      
      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
      
      - name: Run CMake and Build
        run: cmake -DCMAKE_BUILD_TYPE=RelWithDebugInfo -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc -B build -G "Unix Makefiles"

      - name: Print Build for Debugging
        shell: bash
        run: ls -la build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}
          path: |
            build/*.exe
            build/*.pdb
