name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [shared, static]
        config:
        - name: Windows
          os: windows-2025
          id: windows

        - name: Linux
          os: ubuntu-24.04
          id: linux

        - name: MacOS
          os: macos-15
          id: macosx

    name: ${{ matrix.config.name }} (${{ matrix.libs }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install MSYS2 and Packages
        if: matrix.config.id == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          install: >
            mingw-w64-x86_64-sdl3
            mingw-w64-x86_64-sdl3-image
            mingw-w64-x86_64-sdl3-ttf
            libcurl-devel

      - name: Update Linux Packages
        if: matrix.config.id == 'linux'
        run: sudo apt update

      - name: Install Linux Packages
        if: matrix.config.id == 'linux'
        run: >
          sudo apt install
          libsdl3-dev
          libsdl3-image-dev
          libsdl3-ttf-dev
          libcurl4-openssl-dev

      - name: Install MacOS Packages
        if: matrix.config.id == 'macosx'
        run: >
          brew install
          sdl3
          sdl3_image
          sdl3_ttf
          curl
        
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          disable_annotations: true
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Setup Build Cache
        uses: actions/cache@v4
        with:
          path: build
          key: submodulecache-${{ matrix.config.id }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            submodulecache-${{ matrix.config.id }}-
      
      - name: Install Meson
        run: python -m pip install meson

      - name: Update cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Update Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        uses: ashutoshvarma/setup-ninja@master
      
      - name: Setup
        run: >
          cmake
          -D CMAKE_BUILD_TYPE=RelWithDebInfo
          -D BUILD_SHARED_LIBS=${{ matrix.libs == 'shared' && 'TRUE' || 'FALSE' }}
          -B build
          -G Ninja
      
      - name: Build
        run: >
          cmake
          --build build
          --target all
      
      - name: Pack Bin
        run: >
          py ./install-bin.py
          --search-depth 5

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/bin
