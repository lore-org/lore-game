name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [shared, static]
        config:
        - name: Windows
          os: windows-latest
          id: windows

        - name: Linux
          os: ubuntu-latest
          id: linux

        - name: macOS
          os: macos-latest
          id: macosx

    name: ${{ matrix.config.name }} (${{ matrix.libs }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Update Packages
        if: matrix.config.id == 'linux'
        run: sudo apt update

      - name: Install Packages
        if: matrix.config.id == 'linux'
        run: >
          sudo apt install
          libudev-dev
          libdbus-1-dev
          libpipewire-0.3-dev
          libwayland-dev
          libwayland-bin
          libxkbcommon-dev
          libegl-dev
          libgl-dev
        
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          disable_annotations: true

      - name: Setup Submodule Cache
        uses: actions/cache@v4
        with:
          path: build/submodules
          key: submodulecache-${{ matrix.config.id }}-${{ hashFiles('**/.gitmodules') }}
          restore-keys: |
            submodulecache-${{ matrix.config.id }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MSYS2
        if: matrix.config.id == 'windows'
        uses: msys2/setup-msys2@v2
      
      - name: Set up GCC
        if: matrix.config.id != 'windows'
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 12
      
      - name: Setup
        run: >
          cmake
          -D CMAKE_BUILD_TYPE=RelWithDebInfo
          -D CMAKE_EXPORT_COMPILE_COMMANDS=TRUE
          -D BUILD_SHARED_LIBS=${{ matrix.libs == 'shared' && 'TRUE' || 'FALSE' }}
          -B build
          -G Ninja
      
      - name: Build
        run: >
          cmake
          --build build
          --config RelWithDebInfo
          --target all
      
      - name: Pack Bin
        run: >
          py ./install-bin.py
          --searchdepth 5

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/bin
