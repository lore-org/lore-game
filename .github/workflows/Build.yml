name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          id: win
          libs: shared

        - name: Linux
          os: ubuntu-latest
          id: linux
          libs: static

        - name: macOS
          os: macos-latest
          id: mac
          libs: static

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Upgrade CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Config
        run: xmake config -m release --static=${{ matrix.config.libs == 'static' && 'y' || 'n' }} -vy
      
      - name: Build
        run: xmake -vy
      
      - name: Install
        run: xmake install -vy

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.config.libs }}
          path: build/bin
