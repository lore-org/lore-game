name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]

env:
  NDK_VERSION: 29.0.13599879

  LINUX_PKGS: >
    libssl-dev
    llvm
    libmbedtls-dev
    
    libc++-dev
    libwayland-dev
    libxkbcommon-dev
    xorg-dev
  WINDOWS_PKGS:
  BREW_PKGS: >
    openssl
    llvm
    mbedtls

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [shared, static]
        config:
        # - name: Windows
        #   os: windows-2025
        #   id: windows

        - name: Linux
          os: ubuntu-24.04
          id: linux

        # - name: MacOS
        #   os: macos-15
        #   id: macos

        # - name: Android
        #   os: ubuntu-24.04
        #   id: android

        # - name: Self-Hosted Windows
        #   os: lexi-win
        #   id: windows

        # - name: Self-Hosted Linux
        #   os: lexi-linux
        #   id: linux

    name: ${{ matrix.config.name }} (${{ matrix.libs }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Ensure Git Symlink Support
        continue-on-error: true
        run: |
          git config --global --unset-all core.symlinks
          git config --global --add core.symlinks true

      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v2
        with:
          submodules: recursive


      - name: Hash Package Lists
        id: hash
        run: |
          echo "LINUX_PKGS=$(echo -n "$LINUX_PKGS" | openssl dgst -sha256 | awk '{print $NF}')" >> $GITHUB_OUTPUT
          echo "WINDOWS_PKGS=$(echo -n "$WINDOWS_PKGS" | openssl dgst -sha256 | awk '{print $NF}')" >> $GITHUB_OUTPUT
          echo "BREW_PKGS=$(echo -n "$BREW_PKGS" | openssl dgst -sha256 | awk '{print $NF}')" >> $GITHUB_OUTPUT

          
      # - name: '[Windows] - Install vcpkg'
      #   if: matrix.config.id == 'windows'
      #   uses: lukka/run-vcpkg@v11
      #   with:
      #     vcpkgGitCommitId: ef7dbf94b9198bc58f45951adcf1f041fcbc5ea0
      #     doNotCache: false

      # - name: '[Windows] - Install Leftover Windows Packages'
      #   if: matrix.config.id == 'windows'
      #   run: vcpkg install ${{ env.WINDOWS_PKGS }}


      - name: '[Linux/Android] - Update Linux Packages'
        if: matrix.config.id == 'linux' || matrix.config.id == 'android'
        run: sudo apt-get update -y

      - name: '[Linux/Android] - Install and Cache Linux Packages'
        if: matrix.config.id == 'linux' || matrix.config.id == 'android'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ env.LINUX_PKGS }}
          execute_install_scripts: true
          version: ${{ steps.hash.outputs.LINUX_PKGS }}


      - name: '[MacOS] - Setup Homebrew'
        if: matrix.config.id == 'macos'
        id: homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: '[MacOS] - Setup Homebrew Cache'
        if: matrix.config.id == 'macos'
        id: brewcache
        uses: actions/cache@v4
        with:
          path: ${{ steps.homebrew.outputs.gems-path }}
          key: brewcache-${{ matrix.config.id }}-${{ steps.homebrew.outputs.gems-hash }}
          restore-keys: brewcache-${{ matrix.config.id }}-

      - name: '[MacOS] - Install Leftover Brew Packages'
        if: matrix.config.id == 'macos'
        run: brew install ${{ env.BREW_PKGS }}
        

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          disable_annotations: true
        env:
          SCCACHE_GHA_ENABLED: 'true'

      - name: Setup Build Cache
        id: buildcache
        uses: actions/cache@v4
        with:
          path: |
            build
            !build/bin
          key: buildcache-${{ matrix.config.id }}-${{ matrix.libs }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            buildcache-${{ matrix.config.id }}-${{ matrix.libs }}-
            buildcache-${{ matrix.config.id }}-

      - name: Update Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'
          cache: 'pip'
      
      - name: Install Meson
        run: python -m pip install meson

      - name: Update cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Install Ninja
        uses: ashutoshvarma/setup-ninja@master

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: '[Windows/Linux/Android] - Setup Clang'
        if: matrix.config.id != 'macos'
        id: clang
        uses: egor-tensin/setup-clang@v2

      
      - name: '[Android] - Install JDK 21'
        if: matrix.config.id == 'android'
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: '[Android] - Setup Android SDK'
        if: matrix.config.id == 'android'
        id: android-sdk
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;35.0.0 cmdline-tools;latest ndk;${{ env.NDK_VERSION }} platforms;android-33'
      
      - name: Update ENVs for Android SDK
        if: matrix.config.id == 'android'
        run: |
          echo "ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK=${{ env.ANDROID_NDK_HOME }}" >> "$GITHUB_ENV"
        env: 
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}/ndk/${{ env.NDK_VERSION }}

  
      - name: Setup
        if: steps.buildcache.outputs.cache-hit != 'true'
        shell: bash
        run: >
          cmake
          -D CMAKE_BUILD_TYPE=RelWithDebInfo
          -D BUILD_SHARED_LIBS=${{ case(matrix.libs == 'shared', 'ON', 'OFF') }}
          ${{ case( matrix.config.id == 'android', '-D CMAKE_SYSTEM_NAME=Android', '' ) }}
          ${{ case( steps.clang.outputs.clang != '',    format('-D CMAKE_C_COMPILER={0}',   steps.clang.outputs.clang),   '' ) }}
          ${{ case( steps.clang.outputs.clangxx != '',  format('-D CMAKE_CXX_COMPILER={0}', steps.clang.outputs.clangxx), '' ) }}
          -B build
          -G Ninja
          --log-level DEBUG
          --fresh
      
      - name: Build
        shell: bash
        run: >
          cmake
          --build build
          --target all
          -j $(nproc)
          -v


      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: |
            build/bin
