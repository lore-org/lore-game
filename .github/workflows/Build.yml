name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [shared, static]
        config:
        - name: Windows
          os: windows-2025
          id: windows

        - name: Linux
          os: ubuntu-24.04
          id: linux

        - name: MacOS
          os: macos-15
          id: macosx

    name: ${{ matrix.config.name }} (${{ matrix.libs }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install MSYS2 and Packages
        if: matrix.config.id == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          install: >
            brotli-devel
            heimdal-devel
            libidn2-devel
            libnghttp2-devel
            mingw-w64-x86_64-nghttp3
            libngtcp2-devel
            libpsl-devel
            libssh2-devel
            libunistring-devel
            openssl-devel
            zlib-devel

      - name: Update Linux Packages
        if: matrix.config.id == 'linux'
        run: sudo apt-get update

      - name: Install Linux Packages
        if: matrix.config.id == 'linux'
        run: >
          sudo apt-get install
          libasound2-dev
          libdbus-1-dev
          libdecor-0-dev
          libdrm-dev
          libegl-dev
          libgbm-dev
          libgl-dev
          libgles-dev
          libibus-1.0-dev
          libpipewire-0.3-dev
          libpulse-dev
          libsndio-dev
          libudev-dev
          libwayland-dev
          libx11-dev
          libxcursor-dev
          libxext-dev
          libxfixes-dev
          libxi-dev
          libxinerama-dev
          libxkbcommon-dev
          libxrandr-dev
          libxss-dev
          libxt-dev
          libxv-dev
          libxxf86vm-dev
          libjpeg-dev
          libpng-dev
          libtiff-dev
          libwebp-dev
          libc6-dev
          libfreetype-dev
          libharfbuzz-dev
          libbrotli-dev
          libidn2-dev
          libkrb5-dev
          libldap-dev
          libnghttp2-dev
          libpsl-dev
          librtmp-dev
          libssh2-1-dev
          libssl-dev
          libzstd-dev
          zlib1g-dev

      - name: Install Homebrew
        if: matrix.config.id == 'macosx'
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install MacOS Packages
        if: matrix.config.id == 'macosx'
        run: >
          brew install
          brotli
          heimdal
          libidn2
          libnghttp2
          libnghttp3
          libpsl
          libssh2
          libunistring
          openssl
          zlib
          llvm
        
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          disable_annotations: true
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Setup Build Cache
        uses: actions/cache@v4
        with:
          path: |
            build
            !build/bin
          key: buildcache-${{ matrix.config.id }}-${{ matrix.libs }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            buildcache-${{ matrix.config.id }}-${{ matrix.libs }}-
            buildcache-${{ matrix.config.id }}-
      
      - name: Install Meson
        run: python -m pip install meson

      - name: Update cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Update Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        uses: ashutoshvarma/setup-ninja@master
      
      - name: Setup
        run: >
          cmake
          -D CMAKE_BUILD_TYPE=RelWithDebInfo
          -D BUILD_SHARED_LIBS=${{ matrix.libs == 'shared' && 'TRUE' || 'FALSE' }}
          -B build
          -G Ninja
      
      - name: Build
        run: >
          cmake
          --build build
          --target all

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/bin
