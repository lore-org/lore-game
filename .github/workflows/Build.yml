name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]

env:
  NDK_VERSION: 29.0.13599879
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [shared, static]
        config:
        - name: Windows
          os: windows-2025
          id: windows

        - name: Linux
          os: ubuntu-24.04
          id: linux

        - name: MacOS
          os: macos-15
          id: macos

        - name: Android
          os: ubuntu-24.04
          id: android

    name: ${{ matrix.config.name }} (${{ matrix.libs }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install vcpkg
        if: matrix.config.id == 'windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ef7dbf94b9198bc58f45951adcf1f041fcbc5ea0

      - name: Install Windows Packages
        if: matrix.config.id == 'windows'
        run: >
          vcpkg install
          brotli
          libidn2
          nghttp2
          nghttp3
          ngtcp2
          libpsl
          libssh2
          libunistring
          openssl
          zlib
          libjpeg-turbo
          libpng
          libdeflate
          jbig2dec
          lerc
          liblzma
          zstd
          libwebp
          tiff
          libusb
          giflib
          freeglut
          sdl3
          sdl3-image
          sdl3-ttf
          llvm

      - name: Update Linux Packages
        if: matrix.config.id == 'linux'
        run: sudo apt-get update

      - name: Install Linux Packages
        if: matrix.config.id == 'linux'
        run: >
          sudo apt-get install
          libasound2-dev
          libdbus-1-dev
          libdecor-0-dev
          libdrm-dev
          libegl-dev
          libgbm-dev
          libgl-dev
          libgles-dev
          libibus-1.0-dev
          libpipewire-0.3-dev
          libpulse-dev
          libsndio-dev
          libudev-dev
          libwayland-dev
          libx11-dev
          libxcursor-dev
          libxext-dev
          libxfixes-dev
          libxi-dev
          libxinerama-dev
          libxkbcommon-dev
          libxrandr-dev
          libxss-dev
          libxt-dev
          libxv-dev
          libxxf86vm-dev
          libjpeg-dev
          libpng-dev
          libtiff-dev
          libwebp-dev
          libc6-dev
          libfreetype-dev
          libharfbuzz-dev
          libbrotli-dev
          libidn2-dev
          libkrb5-dev
          libldap-dev
          libnghttp2-dev
          libpsl-dev
          librtmp-dev
          libssh2-1-dev
          libssl-dev
          libzstd-dev
          zlib1g-dev
          libjack-jackd2-dev
          libunwind-dev
          libusb-1.0-0-dev
          libusb-dev
          clang-19

      - name: Install Homebrew
        if: matrix.config.id == 'macos'
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install MacOS Packages
        if: matrix.config.id == 'macos'
        run: >
          brew install
          heimdal
          libnghttp3
          libpsl
          zlib
          llvm
          libtiff
          sdl3
          sdl3_image
          sdl3_ttf
          llvm
        
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          disable_annotations: true
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Setup Build Cache
        id: buildcache
        uses: actions/cache@v4
        with:
          path: |
            build
            !build/bin
          key: buildcache-${{ matrix.config.id }}-${{ matrix.libs }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            buildcache-${{ matrix.config.id }}-${{ matrix.libs }}-
            buildcache-${{ matrix.config.id }}-
      
      - name: Install Meson
        run: python -m pip install meson

      - name: Update cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Update Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Ninja
        uses: ashutoshvarma/setup-ninja@master
      
      - name: Install JDK 17
        if: matrix.config.id == 'android'
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        if: matrix.config.id == 'android'
        id: android-sdk
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;36.0.0-rc5 cmdline-tools;latest ndk;${{ env.NDK_VERSION }} platforms;android-29'
      
      - name: Update ENVs for Android SDK
        if: matrix.config.id == 'android'
        run: |
          echo "ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}" >> "$GITHUB_ENV"
          echo "${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
        env: 
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}/ndk/${{ env.NDK_VERSION }}
      
      # TODO - cache output
      - name: Build and Install Android OpenSSL
        if: matrix.config.id == 'android'
        run: |
          git clone https://github.com/openssl/openssl --recursive
          cd openssl
          ./Configure android-arm64 -D__ANDROID_API__=29 -D__ANDROID_MIN_SDK_VERSION__=24
          make
          sudo make install
      
      - name: Setup
        if: steps.buildcache.outputs.cache-hit != 'true'
        run: >
          cmake
          -D CMAKE_BUILD_TYPE=RelWithDebInfo
          -D CMAKE_FIND_ROOT_PATH=${{ github.workspace }}/openssl
          -D BUILD_SHARED_LIBS=${{ matrix.libs == 'shared' && 'ON' || 'OFF' }}
          ${{ matrix.config.id == 'android' && '-D CMAKE_SYSTEM_NAME=Android' || '' }}
          -B build
          -G Ninja
      
      - name: Build
        shell: bash
        run: >
          cmake
          --build build
          --target all
          -j $(nproc)

      - name: Upload Artifacts
        if: matrix.config.id != 'android'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/bin

      - name: Upload APK
        if: matrix.config.id == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/*_apk/build/outputs/apk/debug/*.apk
