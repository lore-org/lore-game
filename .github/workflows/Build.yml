name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          id: win

        - name: Linux
          os: ubuntu-latest
          id: linux

        - name: macOS
          os: macos-latest
          id: mac

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup Build Cache
        uses: actions/cache@v4
        with:
          path: build
          key: buildcache-${{ matrix.config.id }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            buildcache-${{ matrix.config.id }}-

      - name: Setup vcpkg Cache
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkgcache-${{ hashFiles('**/vcpkg-configuration.json') }}-${{ hashFiles('**/vcpkg.json') }}-${{ matrix.config.id }}
          restore-keys: |
            vcpkgcache-${{ hashFiles('**/vcpkg-configuration.json') }}-${{ hashFiles('**/vcpkg.json') }}-
            vcpkgcache-${{ hashFiles('**/vcpkg-configuration.json') }}-
            vcpkgcache-

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Install X11
        if: ${{ matrix.config.id == 'linux' }}
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install xorg-dev -y
      
      - name: Run CMake and Build
        run: |
          cmake -DCMAKE_BUILD_TYPE=RelWithDebugInfo -B build -G Ninja
          cmake --build build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}
          path: |
            **lore-game*
            resources
