name: Build

on:
  push:
    branches: [ main ]
    
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        libs: [shared, static]
        config:
        - name: Windows
          os: windows-2025
          id: windows

        - name: Linux
          os: ubuntu-24.04
          id: linux

        - name: MacOS
          os: macos-15
          id: macos

        - name: android
          os: ubuntu-24.04
          id: android

    name: ${{ matrix.config.name }} (${{ matrix.libs }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Install MSYS2 and Packages
        if: matrix.config.id == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          install: >
            brotli-devel
            heimdal-devel
            libidn2-devel
            libnghttp2-devel
            mingw-w64-x86_64-nghttp3
            libngtcp2-devel
            libpsl-devel
            libssh2-devel
            libunistring-devel
            openssl-devel
            zlib-devel

      - name: Update Linux Packages
        if: matrix.config.id == 'linux'
        run: sudo apt-get update

      - name: Install Linux Packages
        if: matrix.config.id == 'linux'
        run: >
          sudo apt-get install
          libasound2-dev
          libdbus-1-dev
          libdecor-0-dev
          libdrm-dev
          libegl-dev
          libgbm-dev
          libgl-dev
          libgles-dev
          libibus-1.0-dev
          libpipewire-0.3-dev
          libpulse-dev
          libsndio-dev
          libudev-dev
          libwayland-dev
          libx11-dev
          libxcursor-dev
          libxext-dev
          libxfixes-dev
          libxi-dev
          libxinerama-dev
          libxkbcommon-dev
          libxrandr-dev
          libxss-dev
          libxt-dev
          libxv-dev
          libxxf86vm-dev
          libjpeg-dev
          libpng-dev
          libtiff-dev
          libwebp-dev
          libc6-dev
          libfreetype-dev
          libharfbuzz-dev
          libbrotli-dev
          libidn2-dev
          libkrb5-dev
          libldap-dev
          libnghttp2-dev
          libpsl-dev
          librtmp-dev
          libssh2-1-dev
          libssl-dev
          libzstd-dev
          zlib1g-dev

      - name: Install Homebrew
        if: matrix.config.id == 'macos'
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install MacOS Packages
        if: matrix.config.id == 'macos'
        run: >
          brew install
          heimdal
          libnghttp3
          libpsl
          zlib
          llvm
        
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          disable_annotations: true
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Setup Build Cache
        uses: actions/cache@v4
        with:
          path: |
            build
            !build/bin
          key: buildcache-${{ matrix.config.id }}-${{ matrix.libs }}-${{ hashFiles('**/CMakeLists.txt') }}
      
      - name: Install Meson
        run: python -m pip install meson

      - name: Update cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Update Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        uses: ashutoshvarma/setup-ninja@master

      - name: Check Amount of Cores
        id: cpu
        run: |
          import os

          num_cpus = os.cpu_count()
          output_file = os.environ["GITHUB_OUTPUT"]

          with open(output_file, "a") as file:
              file.write(f"threads={int(num_cpus)}\ncores={int(num_cpus / 2)}\n")
        shell: python
      
      - name: Install JDK 17
        uses: actions/setup-java@v3
        if: matrix.config.id == 'android'
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        if: matrix.config.id == 'android'
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;36.0.0-rc5 cmdline-tools;latest ndk;29.0.13599879 platforms;android-29'
      
      - name: Debug NDK
        if: matrix.config.if == 'android'
        run: ls -R $ANDROID_NDK
      
      # TODO - cache output
      - name: Build and Install Android OpenSSL
        if: matrix.config.id == 'android'
        run: |
          git clone https://github.com/openssl/openssl --recursive
          cd openssl
          export ANDROID_NDK_HOME=$ANDROID_SDK/ndk/29.0.13599879
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          ./Configure android-arm64 -D__ANDROID_API__=29 -D__ANDROID_MIN_SDK_VERSION__=24
          make
          sudo make install
      
      - name: Setup
        run: >
          cmake
          -D CMAKE_BUILD_TYPE=RelWithDebInfo
          -D CMAKE_FIND_ROOT_PATH=${{ github.workspace }}/openssl
          -D BUILD_SHARED_LIBS=${{ matrix.libs == 'shared' && 'TRUE' || 'FALSE' }}
          ${{ matrix.config.id == 'android' && '-D CMAKE_SYSTEM_NAME=Android' || '' }}
          -B build
          -G Ninja
      
      - name: Build
        run: >
          cmake
          --build build
          --target all
          -j ${{ steps.cpu.outputs.threads }}

      - name: Upload Artifacts
        if: matrix.config.id != 'android'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/bin

      - name: Upload APK
        if: matrix.config.id == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.id }}-${{ matrix.libs }}
          path: build/*_apk/build/outputs/apk/debug/*.apk
